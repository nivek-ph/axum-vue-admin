name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Vercel deployment environment
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@56.5.0

      - name: Select deployment environment
        env:
          REQUESTED_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          echo "DEPLOY_ENV=${REQUESTED_ENVIRONMENT}" >> "${GITHUB_ENV}"

      - name: Pull Vercel settings
        run: vercel pull --yes --environment="${DEPLOY_ENV}" --token="${VERCEL_TOKEN}"

      - name: Deploy backend
        run: |
          args=(--yes --token="${VERCEL_TOKEN}")
          if [[ "${DEPLOY_ENV}" == "production" ]]; then
            args+=(--prod)
          fi
          deployment_url="$(vercel deploy "${args[@]}")"
          echo "### Backend" >> "${GITHUB_STEP_SUMMARY}"
          echo "${deployment_url}" >> "${GITHUB_STEP_SUMMARY}"

  frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/desktop
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@56.5.0

      - name: Select deployment environment
        env:
          REQUESTED_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          echo "DEPLOY_ENV=${REQUESTED_ENVIRONMENT}" >> "${GITHUB_ENV}"

      - name: Pull Vercel settings
        run: vercel pull --yes --environment="${DEPLOY_ENV}" --token="${VERCEL_TOKEN}"

      - name: Deploy frontend
        run: |
          args=(--yes --build-env VITE_API_BASE_URL="${VITE_API_BASE_URL}" --token="${VERCEL_TOKEN}")
          if [[ "${DEPLOY_ENV}" == "production" ]]; then
            args+=(--prod)
          fi
          deployment_url="$(vercel deploy "${args[@]}")"
          echo "### Frontend" >> "${GITHUB_STEP_SUMMARY}"
          echo "${deployment_url}" >> "${GITHUB_STEP_SUMMARY}"

